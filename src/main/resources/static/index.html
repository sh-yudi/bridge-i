<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge-i Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 2rem; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        input { padding: 0.5rem; width: 100%; box-sizing: border-box; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px;}
        button { padding: 0.5rem 1rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 0.5rem;}
        button:hover { background: #0056b3; }
        button.secondary { background: #28a745; }
        button.secondary:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌉 Bridge-i Customer Dashboard</h2>

    <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 6px; margin-bottom: 2rem;">
        <h3>Add New Cloud Customer</h3>
        <div class="form-group">
            <label>ID</label>
            <input type="number" id="custId" placeholder="e.g. 999">
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="custName" placeholder="e.g. Utkarsh Dev">
        </div>
        <div class="form-group">
            <label>Status</label>
            <input type="text" id="custStatus" placeholder="e.g. ACTIVE">
        </div>
        <div class="form-group">
            <label>Join Date</label>
            <input type="text" id="custDate" placeholder="YYYY/MM/DD">
            <span id="dateError" style="color: red; display: none; font-size: 0.85rem; margin-top: 5px;">
                Invalid date! Check the month, day, and leap year.
            </span>
        </div>
        <button id="saveBtn" onclick="submitData()">Save to PostgreSQL</button>
    </div>

    <button class="secondary" onclick="loadData()">Load All Customers</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Status</th>
            <th>Joined Date</th>
        </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
    // 1. Function to GET data from your API
    async function loadData() {
        const response = await fetch('/api/customers');
        const customers = await response.json();

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // Clear old data

        customers.forEach(cust => {
            const row = `<tr>
                <td>${cust.id}</td>
                <td>${cust.fullName}</td>
                <td>${cust.accountStatus}</td>
                <td>${cust.joinedDate}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Strict mathematical date validator
    function isValidDate(dateString) {
        // Make sure a date was actually entered
        if (!dateString) return false;

        // Split the YYYY-MM-DD string into numbers
        const parts = dateString.split('/');
        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10);
        const day = parseInt(parts[2], 10);

        // 1. Check Month limits (1 to 12)
        if (month < 1 || month > 12) return false;

        // 2. Define max days for each month (Jan, Feb, Mar, etc.)
        const daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

        // 3. Leap Year Check for February
        // Leap years are divisible by 4. (Exceptions: Divisible by 100 unless also divisible by 400).
        if (year % 400 === 0 || (year % 100 !== 0 && year % 4 === 0)) {
            daysInMonth[1] = 29; // Update February to 29 days
        }

        // 4. Check Day limits based on the specific month
        if (day < 1 || day > daysInMonth[month - 1]) return false;

        return true;
    }
    // 2. Function to POST data to your API
    // Real-time listener for the Date input field
    document.getElementById('custDate').addEventListener('input', function(event) {
        const inputVal = event.target.value;
        const errorSpan = document.getElementById('dateError');
        const saveBtn = document.getElementById('saveBtn');

        if (inputVal.length === 10) {
            if (isValidDate(inputVal)) {
                errorSpan.style.display = 'none';
                event.target.style.borderColor = '#28a745';
                saveBtn.disabled = false;
            } else {
                errorSpan.style.display = 'block';
                event.target.style.borderColor = 'red';
                saveBtn.disabled = true;
            }
        } else {
            errorSpan.style.display = 'none';
            event.target.style.borderColor = '#ccc';
            saveBtn.disabled = false;
        }
    });
    async function submitData() {
         const dateInput = document.getElementById('custDate').value;

        const newCustomer = {
            id: document.getElementById('custId').value,
            fullName: document.getElementById('custName').value,
            accountStatus: document.getElementById('custStatus').value,
            // Swap the slashes back to dashes for Java!
            joinedDate: dateInput.replaceAll('/', '-')
        };

        const response = await fetch('/api/customers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newCustomer)
        });

        if (response.ok) {
            alert("Customer saved successfully!");
            // Clear the form
            document.getElementById('custId').value = '';
            document.getElementById('custName').value = '';
            document.getElementById('custStatus').value = '';
            document.getElementById('custDate').value = '';

            // Auto-refresh the table
            loadData();
        } else {
            // Read the exact error message sent by the Spring Boot backend
            const errorMessage = await response.text();
            alert(errorMessage);
        }
    }
</script>

</body>
</html>
